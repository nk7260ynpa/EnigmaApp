name: EnigmaApp
options:
  bundleIdPrefix: com.enigmaapp
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  EnigmaApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/EnigmaApp
      - path: Sources/EnigmaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enigmaapp.EnigmaApp
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_NAME: EnigmaApp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
    info:
      path: Sources/EnigmaApp/Info.plist
      properties:
        CFBundleName: EnigmaApp
        CFBundleDisplayName: Enigma Machine Simulator
        LSMinimumSystemVersion: "14.0"

  EnigmaCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/EnigmaCoreTests
    dependencies:
      - target: EnigmaApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enigmaapp.EnigmaCoreTests
